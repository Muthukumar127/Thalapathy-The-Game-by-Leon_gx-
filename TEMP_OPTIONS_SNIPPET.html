<div id="options-overlay" class="overlay hidden">
  <h2 class="screen-title">OPTIONS</h2>
  <div style="max-width:420px; text-align:left;">
    <div style="margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:10px;"><input id="opt-music-toggle" type="checkbox" checked/> Music</label>
    </div>
    <div style="margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:10px;"><input id="opt-sfx-toggle" type="checkbox" checked/> SFX</label>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
      <button id="options-close" class="btn-primary">CLOSE</button>
      <button id="options-reset" class="btn-secondary">RESET PROGRESS</button>
    </div>
  </div>
</div>
